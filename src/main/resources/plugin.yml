name: BayMcTipsPro
version: '${version}'
main: com.baymc.tipspro.BayMcTipsProPlugin
api-version: '26.1.2'
folia-supported: true
authors:
  - BayMC
description: Lightweight MiniMessage chat announcement plugin for Paper and Folia
commands:
  baymctipspro:
    description: BayMcTipsPro command
    usage: /baymctipspro <help|info|next|status|reload>
    aliases:
      - tips
permissions:
  baymctipspro.command:
    description: Use BayMcTipsPro commands
    default: op
