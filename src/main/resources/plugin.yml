name: BayMcTipsPro
version: '${version}'
main: com.baymc.tipspro.BayMcTipsProPlugin
api-version: '26.1.2'
folia-supported: true
authors:
  - Konsheng
description: Paper/Folia 轻量级 MiniMessage 聊天栏公告插件
commands:
  baymctipspro:
    description: BayMcTipsPro 主命令
    usage: /baymctipspro <help|info|next|status|reload>
    aliases:
      - tips
permissions:
  baymctipspro.help:
    description: 允许查看 BayMcTipsPro 命令帮助
    default: op
  baymctipspro.info:
    description: 允许查看 BayMcTipsPro 插件信息
    default: op
  baymctipspro.next:
    description: 允许立即发送随机公告
    default: op
  baymctipspro.status:
    description: 允许查看公告运行状态
    default: op
  baymctipspro.reload:
    description: 允许重载 BayMcTipsPro 配置和语言文件
    default: op
